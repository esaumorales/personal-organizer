<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght,XOPQ,XTRA,YOPQ,YTDE,YTFI,YTLC,YTUC@8..144,100..1000,96,468,79,-203,738,514,712&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/icon.css">

</head>

<body>

    <div class="container">

        <aside class="sidebar" id="sidebar"></aside>

        <main class="main">
            <header class="header" id="header"></header>
            <div class="content-body">
                <section class="dashboard" id="dashboard">
                    <div class="greeting" id="greeting"></div>
                </section>

                <section class="cards" id="cards"></section>

                <section class="calendar" id="calendar"></section>

                <div class="bottom-row">
                    <section class="tasks" id="tasks"></section>

                    <section class="streak" id="streak"></section>
                </div>
            </div>

        </main>

    </div>

    <!-- JS -->
    <script type="module" src="../js/main.js"></script>

</body>

</html>
